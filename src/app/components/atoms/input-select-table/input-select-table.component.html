<div class="bocc-input-select-container">
  <label class="bocc-input-select-label">Mostrar</label>

  <div class="bocc-custom-select" [class.is-open]="isOpen()">
    <div class="bocc-select-trigger" (click)="toggleDropdown()">
      <span class="bocc-select-text">{{ currentValue() }}</span>
      <span class="bocc-select-arrow"
        style="mask-image: url('assets/icoins/arrow-1.svg'); -webkit-mask-image: url('assets/icoins/arrow-1.svg');"></span>
    </div>

    @if (isOpen()) {
    <ul class="bocc-select-options">
      @for (option of options(); track option) {
      <li class="bocc-select-option" [class.is-selected]="option === currentValue()" (click)="selectOption(option)">
        {{ option }}
      </li>
      }
    </ul>
    }
  </div>
</div>
