<div class="calendar-field" #calendarWrapper>

	<label class="calendar-field__label">{{ label() }}</label>

	<button type="button" class="calendar-field__trigger" [disabled]="disabled()" (click)="toggleCalendar()">
		<span class="calendar-field__value" [class.calendar-field__value--placeholder]="!displayValue()">
			{{ displayValue() || placeholder() }}
		</span>

		<span class="calendar-field__icon" aria-hidden="true">📅</span>
	</button>

	@if (isOpen()) {
	<div class="calendar" role="dialog" aria-modal="false">

		<div class="calendar__header">

			<button type="button" class="calendar__nav-button" (click)="onPreviousMonth()" aria-label="Mes anterior">
				‹
			</button>

			<div class="calendar__selectors">

				<select class="calendar__select" [value]="currentMonth()" (change)="onMonthChange($event)">
					@for (monthName of monthNames; track monthName; let monthIndex = $index) {
					<option [value]="monthIndex">{{ monthName }}</option>
					}
				</select>

				<select class="calendar__select" [value]="currentYear()" (change)="onYearChange($event)">
					@for (year of years(); track year) {
					<option [value]="year">{{ year }}</option>
					}
				</select>

			</div>

			<button type="button" class="calendar__nav-button" (click)="onNextMonth()" aria-label="Mes siguiente">
				›
			</button>

		</div>

		<div class="calendar__weekdays">
			@for (weekDay of weekDays; track weekDay) {
			<span class="calendar__weekday">{{ weekDay }}</span>
			}
		</div>

		<div class="calendar__grid">
			@for (day of days(); track trackByDay($index, day)) {
			<button type="button" [class]="getDayButtonClass(day)" [disabled]="day.disabled" (click)="onDaySelect(day)"
				(mouseenter)="onDayHover(day)" (mouseleave)="onDayLeave()">
				{{ day.dayNumber }}
			</button>
			}
		</div>

		<div class="calendar__footer">

			<button type="button" class="calendar__action calendar__action--secondary" (click)="clearSelection()">
				Limpiar
			</button>

			<button type="button" class="calendar__action calendar__action--primary" (click)="closeCalendar()">
				Cerrar
			</button>

		</div>

	</div>
	}
</div>
