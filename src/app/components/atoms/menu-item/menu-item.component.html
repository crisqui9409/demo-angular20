<!-- 
  MenuItem Template
  Semantic button-based structure optimized for interactivity and screen readers.
-->
<button
  class="menu-item"
  [class.menu-item--disabled]="disabled()"
  [disabled]="disabled()"
  (click)="handleClick()"
  type="button"
>
  <!-- Content area for localized label -->
  <span class="menu-item__label">{{ label() }}</span>

  <!-- Optional directional anchor (chevron) -->
  @if (showChevron()) {
    <span class="menu-item__chevron" aria-hidden="true">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 12L10 8L6 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
  }
</button>
