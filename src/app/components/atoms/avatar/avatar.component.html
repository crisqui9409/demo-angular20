<div class="bocc-avatars">
  <div class="bocc-avatar-photo" [class.is-image]="!!imageUrl()" [class.is-placeholder]="!imageUrl()">
    @if (imageUrl()) {
      <img [src]="imageUrl()" [attr.alt]="'ES_AVATAR.IMAGE_ALT' | text: 'ES'" class="bocc-avatar-img" />
    } @else {
      <img
        src="{{ 'ES_AVATAR.DEFAULT_OPTIONS.SRC' | text: 'ES' }}"
        [attr.alt]="'ES_AVATAR.IMAGE_ALT' | text: 'ES'"
        class="bocc-avatar-placeholder"
      />
    }
  </div>
</div>

@if (isExpanded()) {
  <div class="bocc-avatar-content">
    <div class="bocc-avatar-subtitle">{{ subtitleText() }}</div>
    <div class="bocc-avatar-title">{{ titleText() }}</div>
  </div>
}
