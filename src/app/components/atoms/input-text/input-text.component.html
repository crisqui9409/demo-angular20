<div class="input-form">
  <div class="label-row">
    <label
      #inputLabel
      class="input-label"
      [attr.for]="id()"
    >{{ title() }}</label>

    <!-- Tooltip trigger icon – only rendered when label overflows -->
    @if (isTitleOverflowing()) {
      <button
        type="button"
        class="tooltip-trigger"
        aria-label="More information"
        (mouseenter)="showTooltip()"
        (mouseleave)="hideTooltip()"
        (click)="toggleTooltip()"
        (keydown.enter)="toggleTooltip()"
        (keydown.space)="toggleTooltip()"
      >
        <img [src]="imageTooltip" alt="info" width="16" height="16" />

        <!-- Tooltip balloon -->
        @if (isTooltipVisible()) {
          <div
            #tooltipMessage
            class="tooltip-balloon"
            [class.tooltip-balloon--two-lines]="isTwoLines()"
            role="tooltip"
          >
            {{ helpText() }}
          </div>
        }
      </button>
    }
  </div>
  <div
    class="input-container"
    [class.is-focused]="isFocused()"
    [class.is-error]="showError()"
    [class.is-disabled]="isDisable()"
    [class.is-filled]="valueInput()"
  >
    <input
      class="input-text"
      [attr.maxlength]="maxLength()"
      [attr.minlength]="minLength()"
      [disabled]="isDisable()"
      [attr.type]="type()"
      [attr.id]="id()"
      [attr.name]="id()"
      [attr.placeholder]="placeholder()"
      [required]="isRequired()"
      [attr.pattern]="pattern().source"
      [attr.autocomplete]="autocomplete()"
      [attr.inputmode]="inputmode()"
      [ngModel]="valueInput()"
      (ngModelChange)="valueInput.set($event)"
      (input)="onInput($event)"
      (focus)="onFocus($event)"
      (blur)="onBlur($event)"
      (paste)="onPaste($event)"
      (drop)="onDrop($event)"
      (wheel)="onWheel($event)"
      (copy)="onCopy($event)"
      (cut)="onCut($event)"
      (keypress)="onkeypress()"
      (keydown)="onKeydown()"
      aria-autocomplete="none"
    />
  </div>
  
  @if (showError() && errorMessage()) {
    <div class="error-row" role="alert" aria-live="polite">
      <img
        [src]="icon_Error"
        alt="error"
        class="error-icon"
        width="14"
        height="14"
        aria-hidden="true"
      />
      <span class="error-message">{{ errorMessage() }}</span>
    </div>
  }

</div>
