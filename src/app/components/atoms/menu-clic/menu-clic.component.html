<button
  class="menu-clic"
  [class.menu-clic--disabled]="disabled()"
  [disabled]="disabled()"
  (click)="handleClick()"
  type="button"
>
  <span class="menu-clic__label body-sm-semibold">{{ label() }}</span>
  @if (showChevron()) {
    <bocc-master-icon
      class="menu-clic__chevron"
      name="chevron-right"
      size="16px"
      [color]="disabled() ? 'disable' : 'default'"
    />
  }
</button>
